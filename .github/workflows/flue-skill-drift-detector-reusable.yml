name: Flue Skill Drift Detector (reusable)

on:
  workflow_call:
    inputs:
      skill_name:
        description: "Name of the skill to check (e.g. 'sentry-android-sdk')"
        required: true
        type: string
      sdk_repo:
        description: "SDK repo in 'owner/repo' format (e.g. 'getsentry/sentry-android')"
        required: true
        type: string
      pr_number:
        description: "The merged PR number that triggered this run"
        required: true
        type: number
      pr_url:
        description: "The merged PR's HTML URL"
        required: true
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        description: "Anthropic API key for the Flue agent"
        required: true
      SKILL_DRIFT_APP_ID:
        description: "GitHub App ID for cross-repo write to getsentry/sentry-for-ai"
        required: true
      SKILL_DRIFT_APP_PRIVATE_KEY:
        description: "GitHub App private key (paired with SKILL_DRIFT_APP_ID)"
        required: true

concurrency:
  group: flue-skill-drift-detector-${{ inputs.sdk_repo }}-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      result: ${{ steps.run-detector.outputs.result }}
      status: ${{ steps.run-detector.outputs.status }}
    steps:
      - name: Checkout skills repo
        uses: actions/checkout@v4
        with:
          repository: getsentry/sentry-for-ai
          path: skills-repo
          token: ${{ github.token }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: skills-repo/package-lock.json

      - name: Install Flue
        working-directory: skills-repo
        run: npm ci

      - name: Run Flue Detector
        id: run-detector
        working-directory: skills-repo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          SKILL_NAME: ${{ inputs.skill_name }}
          SDK_REPO: ${{ inputs.sdk_repo }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_URL: ${{ inputs.pr_url }}
        run: |
          payload=$(jq -c -n \
            --arg skill "$SKILL_NAME" \
            --arg sdk_repo "$SDK_REPO" \
            --argjson pr_number "$PR_NUMBER" \
            --arg pr_url "$PR_URL" \
            '{skill_name:$skill, sdk_repo:$sdk_repo, pr_number:$pr_number, pr_url:$pr_url}')
          npx flue run skill-drift-detector --target node \
            --id "drift-${SDK_REPO//\//-}-${PR_NUMBER}" \
            --payload "$payload" \
            > result.json
          DELIM=$(openssl rand -hex 16)
          echo "result<<$DELIM" >> "$GITHUB_OUTPUT"
          cat result.json >> "$GITHUB_OUTPUT"
          echo "$DELIM" >> "$GITHUB_OUTPUT"
          ACTION_COUNT=$(jq '.actions | length' result.json)
          if [ "$ACTION_COUNT" -eq 0 ]; then
            echo "status=noop" >> "$GITHUB_OUTPUT"
          else
            echo "status=has-actions" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: detector-result-${{ inputs.skill_name }}-${{ inputs.pr_number }}
          path: skills-repo/result.json
          retention-days: 14

  actuate:
    needs: detect
    if: needs.detect.outputs.status == 'has-actions'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Get App token (cross-repo write to getsentry/sentry-for-ai)
        id: app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.SKILL_DRIFT_APP_ID }}
          private-key: ${{ secrets.SKILL_DRIFT_APP_PRIVATE_KEY }}
          owner: getsentry
          repositories: sentry-for-ai

      - name: Checkout skills repo
        uses: actions/checkout@v4
        with:
          repository: getsentry/sentry-for-ai
          path: skills-repo
          token: ${{ steps.app.outputs.token }}
          fetch-depth: 0

      - name: Download detector result
        uses: actions/download-artifact@v4
        with:
          name: detector-result-${{ inputs.skill_name }}-${{ inputs.pr_number }}
          path: artifact

      - name: Configure git
        working-directory: skills-repo
        run: |
          git config user.name "sentry-skill-drift[bot]"
          git config user.email "sentry-skill-drift[bot]@users.noreply.github.com"

      - name: Apply actions (cross-repo PR + issue creation in getsentry/sentry-for-ai)
        working-directory: skills-repo
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          SKILL_NAME: ${{ inputs.skill_name }}
          SDK_REPO: ${{ inputs.sdk_repo }}
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_URL: ${{ inputs.pr_url }}
        run: |
          set -euo pipefail

          RESULT="${GITHUB_WORKSPACE}/artifact/result.json"
          SUMMARY_PRS=0
          SUMMARY_ISSUES=0
          SUMMARY_SKIPS=0
          SUMMARY_FAILS=0

          # Allowlist: agents are only permitted to edit files under skills/.
          # Any path outside this allowlist triggers downgrade-to-issue. This is
          # a "default deny" guard against the LLM emitting patches that touch
          # CI config, lockfiles, agent code, or other sensitive paths.
          ALLOWED_PATTERN='^skills/'

          add_reference_footer() {
            local body="$1"
            printf '%s\n\nDetected during merge of [%s#%s](%s).' "$body" "$SDK_REPO" "$PR_NUMBER" "$PR_URL"
          }

          handle_create_pr() {
            local action="$1"
            local title body branch patch suffix branch_full
            title=$(jq -r '.title' <<<"$action")
            body=$(jq -r '.body' <<<"$action")
            branch=$(jq -r '.branch' <<<"$action")
            patch=$(jq -r '.patch' <<<"$action")
            suffix=$(date +%s)
            branch_full="skill-drift/${SKILL_NAME}-${SDK_REPO//\//-}-${PR_NUMBER}-${suffix}"

            echo "::group::create_pr for $SKILL_NAME"
            git switch -c "$branch_full" origin/main

            # Apply patch
            if ! printf '%s' "$patch" | git apply --check 2>/tmp/apply-err; then
              echo "::error::Patch did not apply cleanly for $SKILL_NAME"
              cat /tmp/apply-err
              git switch main
              git branch -D "$branch_full"
              SUMMARY_FAILS=$((SUMMARY_FAILS + 1))
              echo "::endgroup::"
              return
            fi
            printf '%s' "$patch" | git apply

            # Protected files check
            local touched
            touched=$( (git diff --name-only HEAD; git ls-files --others --exclude-standard) | sort -u )
            local violation=""
            while IFS= read -r path; do
              [[ -z "$path" ]] && continue
              local normalized="${path#./}"
              if ! [[ "$normalized" =~ $ALLOWED_PATTERN ]]; then
                violation="$path"
                break
              fi
            done <<<"$touched"

            if [[ -n "$violation" ]]; then
              echo "::warning::Protected file touched ($violation) — downgrading to issue"
              git reset --hard origin/main
              git switch main
              git branch -D "$branch_full"
              local issue_body
              issue_body="The Detector proposed a change to a protected path (\`$violation\`) for skill \`$SKILL_NAME\`.\n\nOriginal title: $title\n\nOriginal body:\n\n$body\n\nTouched paths:\n\n\`\`\`\n$touched\n\`\`\`\n\nDetected during merge of [${SDK_REPO}#${PR_NUMBER}](${PR_URL})."
              gh issue create \
                --repo getsentry/sentry-for-ai \
                --title "[skill-drift] Manual review needed: $SKILL_NAME" \
                --body "$issue_body" \
                --label "skill-drift" \
                --label "automated"
              SUMMARY_ISSUES=$((SUMMARY_ISSUES + 1))
              echo "::endgroup::"
              return
            fi

            git add -A
            git commit -m "$title" \
              -m "Detected during merge of ${SDK_REPO}#${PR_NUMBER} (${PR_URL})." \
              -m "\nCo-Authored-By: Claude (claude-opus-4-6 via Flue Detector)"
            git push origin "$branch_full"

            gh pr create \
              --repo getsentry/sentry-for-ai \
              --base main \
              --head "$branch_full" \
              --title "$title" \
              --body "$(add_reference_footer "$body")" \
              --label "skill-drift" \
              --label "automated"

            SUMMARY_PRS=$((SUMMARY_PRS + 1))
            git switch main
            echo "::endgroup::"
          }

          handle_create_issue() {
            local action="$1"
            local title body extra_labels label_args
            title=$(jq -r '.title' <<<"$action")
            body=$(jq -r '.body' <<<"$action")
            extra_labels=$(jq -r '.labels // [] | join(",")' <<<"$action")
            label_args=(--label "skill-drift" --label "automated")
            if [[ -n "$extra_labels" ]]; then
              IFS=',' read -ra extras <<<"$extra_labels"
              for l in "${extras[@]}"; do label_args+=(--label "$l"); done
            fi
            gh issue create \
              --repo getsentry/sentry-for-ai \
              --title "$title" \
              --body "$(add_reference_footer "$body")" \
              "${label_args[@]}"
            SUMMARY_ISSUES=$((SUMMARY_ISSUES + 1))
          }

          handle_skip() {
            local action="$1"
            echo "skip: $SKILL_NAME — $(jq -r '.reason' <<<"$action")"
            SUMMARY_SKIPS=$((SUMMARY_SKIPS + 1))
          }

          while IFS= read -r action; do
            type=$(jq -r '.type' <<<"$action")
            case "$type" in
              create_pr) handle_create_pr "$action" ;;
              create_issue) handle_create_issue "$action" ;;
              skip) handle_skip "$action" ;;
              *) echo "::warning::Unknown action type: $type" ;;
            esac
          done < <(jq -c '.actions[]' "$RESULT")

          echo "::notice::Done. PRs=$SUMMARY_PRS issues=$SUMMARY_ISSUES skips=$SUMMARY_SKIPS fails=$SUMMARY_FAILS"